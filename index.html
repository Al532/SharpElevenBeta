<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sharp Eleven</title>
  <meta name="description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharp Eleven">
  <meta property="og:description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta property="og:url" content="https://al532.github.io/JazzProgressionTrainerDemo/">
  <meta property="og:site_name" content="Sharp Eleven">
  <meta property="og:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharp Eleven">
  <meta name="twitter:description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta name="twitter:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <script src="./theme-bootstrap.js"></script>
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./src/home.ts"></script>
</head>
<body class="home-body">
  <header class="home-header">
    <div class="home-brand" aria-label="Sharp Eleven">
      <img class="home-brand-logo" src="./logo/classic-paper.png" alt="Logo Classic Paper" width="32" height="32">
      <span>Sharp Eleven</span>
    </div>
    <nav class="home-header-links" aria-label="Project links">
      <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.1V17h16V8.1l-7.36 5.15a1.1 1.1 0 0 1-1.28 0L4 8.1Zm1.15-1.1L12 11.8 18.85 7H5.15Z"></path>
        </svg>
      </a>
    </nav>
  </header>

  <main class="home-main" aria-label="Home">
    <div class="home-stack">
      <section class="home-subsection" aria-labelledby="home-chart-search-title">
        <h2 id="home-chart-search-title">Find a chart</h2>
        <label class="home-search-field">
          <span class="sr-only">Search charts</span>
          <input id="home-chart-search-input" type="search" placeholder="Search by title, composer, style, or tag" autocomplete="off">
        </label>
        <p id="home-chart-search-empty" class="home-empty">Recent charts appear here until you search.</p>
        <ul id="home-chart-search-results" class="home-list" aria-label="Chart search results"></ul>
      </section>
    </div>

    <div class="home-actions" aria-label="Home actions">
      <button id="home-import-charts-button" class="home-primary-action" type="button" aria-haspopup="dialog" aria-expanded="false">Import charts</button>
      <a class="home-primary-action" href="./charts.html">Library and setlists</a>
      <a class="home-primary-action" href="./drill.html">Drill mode</a>
    </div>
  </main>

  <div id="home-import-charts-popup" class="home-import-popup" role="dialog" aria-label="Import charts" hidden>
    <div class="home-import-popup-card">
      <div class="home-import-popup-header">
        <strong>Import charts</strong>
        <button id="home-import-close-button" class="home-metadata-close" type="button">Close</button>
      </div>
      <div id="ireal-import-actions" class="home-import-actions">
        <button id="open-ireal-forum-button" type="button" class="home-primary-action">iReal forum charts</button>
        <button id="import-ireal-backup-button" type="button" class="home-primary-action">Restore iReal backup</button>
      </div>
      <div id="ireal-link-import-section" class="home-import-link-section" hidden>
        <label class="home-search-field">
          <span class="sr-only">Import iReal link</span>
          <input id="ireal-link-input" type="text" placeholder="Paste irealb:// link here" spellcheck="false">
        </label>
        <button id="import-ireal-link-button" type="button" class="home-primary-action">Import iReal link</button>
      </div>
      <div id="ireal-backup-restore-section" class="home-import-backup-section" hidden>
        <p class="home-import-note">The straightforward way to restore a backup is to share it from iReal Pro and choose Sharp11 in the list.</p>
        <div class="home-import-backup-actions">
          <button id="ireal-backup-back-button" type="button" class="home-metadata-close">Back</button>
          <button id="ireal-backup-close-button" type="button" class="home-metadata-close">Close</button>
          <button id="ireal-backup-file-button" type="button" class="home-primary-action">Import from file</button>
        </div>
      </div>
    </div>
  </div>
  <input id="ireal-backup-input" type="file" accept=".html,.htm,.txt" hidden>

  <footer class="home-footer">
    <div class="home-theme-picker">
      <button id="home-theme-button" class="home-theme-button" type="button" aria-haspopup="menu" aria-expanded="false"></button>
      <div id="home-theme-menu" class="home-theme-menu hidden" role="menu" aria-label="Choose theme"></div>
    </div>
  </footer>
</body>
</html>
