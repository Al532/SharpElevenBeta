<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Practice jazz progressions and work with charts in Sharp Eleven.">

  <meta property="og:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">

  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharp Eleven">
  <meta name="twitter:description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta name="twitter:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./src/home.ts"></script>

<body class="home-body">
  <div class="home-shell">
    <header class="home-header">
      <a class="home-brand" href="./index.html" aria-label="Sharp Eleven home">Sharp Eleven</a>
      <nav class="home-header-links" aria-label="Project links">
        <a class="home-icon-link" href="#" aria-label="Placeholder link 1" title="Placeholder link 1">?</a>
        <a class="home-icon-link" href="#" aria-label="Placeholder link 2" title="Placeholder link 2">+</a>
        <a class="home-icon-link" href="#" aria-label="Placeholder link 3" title="Placeholder link 3">i</a>
      </nav>
    </header>

    <main class="home-main">
      <section class="home-section home-charts-section" aria-labelledby="home-charts-title">
        <div class="home-section-heading">
          <span class="home-section-kicker">Library</span>
          <h1 id="home-charts-title">Charts</h1>
        </div>

        <div class="home-stack">
          <section class="home-subsection" aria-labelledby="home-recent-charts-title">
            <h2 id="home-recent-charts-title">Recent charts</h2>
            <p id="home-recent-charts-empty" class="home-empty">No recent charts yet.</p>
            <ul id="home-recent-charts" class="home-list" aria-label="Recently viewed charts"></ul>
          </section>

          <section class="home-subsection" aria-labelledby="home-playlists-title">
            <h2 id="home-playlists-title">Playlists</h2>
            <p id="home-playlists-empty" class="home-empty">No playlists yet.</p>
            <ul id="home-playlists" class="home-list" aria-label="Chart playlists"></ul>
          </section>
        </div>

        <a class="home-primary-action" href="./chart-dev/index.html">Import/manage charts</a>
      </section>

      <section class="home-section home-drill-section" aria-labelledby="home-drill-title">
        <div class="home-section-heading">
          <span class="home-section-kicker">Practice</span>
          <h2 id="home-drill-title">Drill mode</h2>
        </div>
        <a class="home-drill-link" href="./drill.html">
          <span>Open Drill mode</span>
          <span aria-hidden="true">-></span>
        </a>
      </section>
    </main>
  </div>
</body>
</html>
