<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Import/manage charts - Sharp Eleven</title>
  <meta name="description" content="Import and manage iReal charts in Sharp Eleven.">
  <meta property="og:description" content="Import and manage iReal charts in Sharp Eleven.">
  <meta property="twitter:description" content="Import and manage iReal charts in Sharp Eleven.">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <script src="./theme-bootstrap.js"></script>
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./charts.ts"></script>
</head>
<body class="home-body">
  <header class="home-header">
    <div class="home-header-leading">
      <a class="app-back-button" href="./index.html" aria-label="Back to home" title="Back to home">
        <span aria-hidden="true"></span>
      </a>
      <div class="home-brand" aria-label="Sharp Eleven">
        <img class="home-brand-logo" src="./logo/classic-paper.png" alt="Logo Classic Paper" width="32" height="32">
        <span>Sharp Eleven</span>
      </div>
    </div>
    <nav class="home-header-links" aria-label="Project links">
      <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.1V17h16V8.1l-7.36 5.15a1.1 1.1 0 0 1-1.28 0L4 8.1Zm1.15-1.1L12 11.8 18.85 7H5.15Z"></path>
        </svg>
      </a>
    </nav>
  </header>

  <main class="home-main" aria-label="Manage charts">
    <div class="home-stack">
      <section class="home-subsection" aria-labelledby="charts-placeholder-title">
        <h1 id="charts-placeholder-title">Import/manage charts</h1>
        <p id="chart-import-status" class="home-empty" role="status" aria-live="polite"></p>
      </section>

      <section class="home-subsection" aria-labelledby="charts-library-title">
        <h2 id="charts-library-title">Library</h2>
        <div class="chart-manage-toolbar">
          <label class="home-search-field chart-manage-search">
            <span class="sr-only">Search library</span>
            <input id="manage-chart-search-input" type="search" placeholder="Search charts">
          </label>
          <select id="manage-origin-filter" class="chart-manage-select" aria-label="Filter by origin">
            <option value="">All charts</option>
            <option value="imported">Imported</option>
            <option value="user">User</option>
          </select>
          <select id="manage-source-filter" class="chart-manage-select" aria-label="Filter by source">
            <option value="">All sources</option>
          </select>
        </div>
        <p id="manage-library-summary" class="home-empty"></p>
        <ul id="manage-chart-list" class="home-list" aria-label="Managed charts"></ul>
      </section>

      <section class="home-subsection" aria-labelledby="charts-sources-title">
        <h2 id="charts-sources-title">Sources</h2>
        <p id="manage-source-summary" class="home-empty"></p>
        <ul id="manage-source-list" class="home-list" aria-label="Chart sources"></ul>
      </section>

      <section class="home-subsection" aria-labelledby="charts-tags-title">
        <h2 id="charts-tags-title">Tags</h2>
        <div class="chart-manage-toolbar">
          <select id="manage-tag-chart-select" class="chart-manage-select" aria-label="Chart to tag"></select>
          <input id="manage-tag-input" class="chart-manage-text-input" type="text" placeholder="Tags separated by commas">
          <button id="manage-save-tags-button" type="button" class="home-primary-action">Save tags</button>
        </div>
      </section>

      <section class="home-subsection" aria-labelledby="charts-setlists-title">
        <h2 id="charts-setlists-title">Setlists</h2>
        <p class="home-empty">Filter the library above, then create a manual-playback setlist from the matching charts.</p>
        <div class="chart-manage-toolbar">
          <input id="manage-setlist-name-input" class="chart-manage-text-input" type="text" placeholder="New setlist name">
          <button id="manage-create-setlist-button" type="button" class="home-primary-action">Create setlist</button>
        </div>
        <ul id="manage-setlist-list" class="home-list" aria-label="Setlists"></ul>
      </section>
    </div>

    <div class="home-actions" aria-label="iReal import controls">
      <button id="import-ireal-backup-button" type="button" class="home-primary-action">Import iReal backup</button>
      <button id="open-ireal-forum-button" type="button" class="home-primary-action">iReal forum tracks</button>
      <button id="clear-all-charts-button" type="button" class="home-primary-action">Remove all charts</button>
    </div>
  </main>

  <input id="ireal-backup-input" type="file" accept=".html,.htm,.txt" hidden>
</body>
</html>
