<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Import and manage iReal charts in Sharp Eleven.">

  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./charts.ts"></script>

<body class="home-body">
  <div class="home-shell">
    <header class="home-header">
      <a class="drill-home-button" href="./index.html" aria-label="Back to home">
        <span aria-hidden="true"></span>
      </a>
      <a class="home-brand" href="./index.html" aria-label="Sharp Eleven home">Sharp Eleven</a>
      <nav class="home-header-links" aria-label="Project links">
        <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">?</a>
      </nav>
    </header>

    <main class="home-main home-manage-charts-main">
      <section class="home-section" aria-labelledby="charts-placeholder-title">
        <h1 id="charts-placeholder-title" class="sr-only">Import/manage charts</h1>
        <p class="home-empty">Use the controls below to import your iReal charts.</p>

        <div class="home-actions" aria-label="iReal import controls">

          <button id="clear-all-charts-button" type="button" class="home-primary-action">Remove all charts</button>
        </div>

        <p id="chart-import-status" class="home-empty" role="status" aria-live="polite"></p>
      </section>
    </main>
  </div>

  <input id="ireal-backup-input" type="file" accept=".html,.htm,.txt" hidden>
