<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Import/manage charts - Sharp Eleven</title>
  <meta name="description" content="Import and manage iReal charts in Sharp Eleven.">
  <meta property="og:description" content="Import and manage iReal charts in Sharp Eleven.">
  <meta property="twitter:description" content="Import and manage iReal charts in Sharp Eleven.">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <script src="./theme-bootstrap.js"></script>
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./charts.ts"></script>
</head>
<body class="home-body">
  <header class="home-header">
    <div class="home-header-leading">
      <a class="app-back-button" href="./index.html" aria-label="Back to home" title="Back to home">
        <span aria-hidden="true"></span>
      </a>
      <div class="home-brand" aria-label="Sharp Eleven">
        <img class="home-brand-logo" src="./logo/classic-paper.png" alt="Logo Classic Paper" width="32" height="32">
        <span>Sharp Eleven</span>
      </div>
    </div>
    <nav class="home-header-links" aria-label="Project links">
      <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.1V17h16V8.1l-7.36 5.15a1.1 1.1 0 0 1-1.28 0L4 8.1Zm1.15-1.1L12 11.8 18.85 7H5.15Z"></path>
        </svg>
      </a>
    </nav>
  </header>

  <main class="home-main chart-manage-main" aria-label="Manage charts">
    <div class="home-stack">
      <section class="home-subsection" aria-labelledby="charts-library-title">
        <h2 id="charts-library-title">Library</h2>
        <div class="chart-manage-filter-grid">
          <label class="home-search-field chart-manage-search">
            <span class="sr-only">Search library</span>
            <input id="manage-chart-search-input" type="search" placeholder="Search title, composer, source, tag">
          </label>
          <div id="manage-origin-filter-row" class="chart-manage-filter-row" hidden>
            <span class="chart-manage-filter-label">Origin:</span>
            <select id="manage-origin-filter" class="chart-manage-select" aria-label="Filter by origin" hidden>
              <option value="">All origins</option>
            </select>
            <div id="manage-origin-filter-chips" class="chart-manage-filter-chips" aria-label="Filter by origin" hidden></div>
          </div>
          <div id="manage-source-filter-row" class="chart-manage-filter-row" hidden>
            <span class="chart-manage-filter-label">Sources:</span>
            <select id="manage-source-filter" class="chart-manage-select" aria-label="Filter by source" hidden>
              <option value="">All sources</option>
            </select>
            <div id="manage-source-filter-chips" class="chart-manage-filter-chips" aria-label="Filter by source" hidden></div>
          </div>
          <div id="manage-tag-filter-row" class="chart-manage-filter-row" hidden>
            <span class="chart-manage-filter-label">Tags:</span>
            <select id="manage-tag-filter" class="chart-manage-select" aria-label="Filter by tag" hidden>
              <option value="">All tags</option>
            </select>
            <div id="manage-tag-filter-chips" class="chart-manage-filter-chips" aria-label="Filter by tag" hidden></div>
          </div>
          <div id="manage-setlist-filter-row" class="chart-manage-filter-row" hidden>
            <span class="chart-manage-filter-label">Setlists:</span>
            <select id="manage-setlist-filter" class="chart-manage-select" aria-label="Filter by setlist" hidden>
              <option value="">All setlists</option>
            </select>
            <div id="manage-setlist-filter-chips" class="chart-manage-filter-chips" aria-label="Filter by setlist" hidden></div>
          </div>
        </div>
        <div id="manage-library-summary" class="chart-manage-results-entry"></div>
        <ul id="manage-chart-list" class="home-list chart-manage-chart-list" aria-label="Managed charts" hidden></ul>
      </section>

      <p class="chart-manage-transfer-hint"><span aria-hidden="true">↑</span> Search above, then drag/drop charts into a setlist below <span aria-hidden="true">↓</span></p>

      <section id="manage-setlists-section" class="home-subsection" aria-labelledby="charts-setlists-title">
        <div class="chart-manage-section-heading">
          <h2 id="charts-setlists-title">Setlists</h2>
          <button id="manage-create-setlist-button" type="button" class="chart-manage-small-action">Create new</button>
        </div>
        <ul id="manage-setlist-list" class="home-list chart-manage-setlist-list" aria-label="Managed setlists"></ul>
      </section>
    </div>
  </main>

  <div id="manage-metadata-panel" class="chart-metadata-panel" hidden></div>
</body>
</html>
