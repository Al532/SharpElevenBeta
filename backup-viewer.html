<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backup</title>
  <link rel="icon" href="./assets/BkfovcRS.ico" sizes="any">
  <link rel="icon" href="./assets/Ba5MLdR8.png" type="image/png" sizes="16x16">
  <link rel="icon" href="./assets/8CA5PvgQ.png" type="image/png" sizes="32x32">
  <link rel="icon" href="./assets/DuxaSCbp.png" type="image/png" sizes="48x48">
  <link rel="apple-touch-icon" href="./assets/CaKPFyjJ.png" sizes="180x180">
  <link rel="manifest" href="./assets/Bv_iDeie.webmanifest">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f1e6;
      color: #1d2a33;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #backup-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    #backup-message {
      display: grid;
      min-height: 100%;
      place-items: center;
      padding: 1.5rem;
      box-sizing: border-box;
      text-align: center;
      font-size: 1rem;
      line-height: 1.4;
      color: #5e6b73;
    }
  </style>
  <script type="module" crossorigin src="./assets/D6-k1xUN.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/B2PlSRge.js">
</head>
<body>
  <iframe id="backup-frame" title="Backup" sandbox="allow-popups allow-top-navigation-by-user-activation"></iframe>
  <div id="backup-message" hidden>Backup unavailable. Choose the backup file again from Sharp11.</div>
</body>
</html>
