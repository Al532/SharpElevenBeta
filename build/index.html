<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sharp Eleven</title>
  <meta name="description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sharp Eleven">
  <meta property="og:description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta property="og:url" content="https://al532.github.io/JazzProgressionTrainerDemo/">
  <meta property="og:site_name" content="Sharp Eleven">
  <meta property="og:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sharp Eleven">
  <meta name="twitter:description" content="Practice jazz progressions and work with charts in Sharp Eleven.">
  <meta name="twitter:image" content="https://al532.github.io/JazzProgressionTrainerDemo/social-preview-wide.png">
  <link rel="icon" type="image/png" href="./assets/BjIbOM6D.png">
  <link rel="shortcut icon" href="./assets/BjIbOM6D.png">
  <script src="./theme-bootstrap.js"></script>
  <script type="module" crossorigin src="./assets/Cg14XgCG.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/Cf-ReJlZ.js">
  <link rel="modulepreload" crossorigin href="./assets/TNZNp2Qd.js">
  <link rel="modulepreload" crossorigin href="./assets/Cm3fqnBM.js">
  <link rel="modulepreload" crossorigin href="./assets/BRTqzA7O.js">
  <link rel="modulepreload" crossorigin href="./assets/BX3AR_jx.js">
  <link rel="modulepreload" crossorigin href="./assets/CgjhvYX9.js">
  <link rel="stylesheet" crossorigin href="./assets/BTs1uvhl.css">
  <link rel="stylesheet" crossorigin href="./assets/DePBmjMY.css">
</head>
<body class="home-body">
  <header class="home-header">
    <div class="home-brand" aria-label="Sharp Eleven">
      <img class="home-brand-logo" src="./assets/Ci--YQ_5.png" data-theme-dark-src="./logo/dark-mode.png" alt="Logo Classic Paper" width="32" height="32">
      <span>Sharp Eleven</span>
    </div>
    <nav class="home-header-links" aria-label="Project links">
      <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.1V17h16V8.1l-7.36 5.15a1.1 1.1 0 0 1-1.28 0L4 8.1Zm1.15-1.1L12 11.8 18.85 7H5.15Z"></path>
        </svg>
      </a>
    </nav>
  </header>

  <main class="home-main" aria-label="Home">
    <div class="home-stack">
      <section class="home-subsection" aria-labelledby="home-chart-search-title">
        <h2 id="home-chart-search-title">Dashboard</h2>
        <label class="home-search-field home-chart-search-field">
          <span class="sr-only">Search charts</span>
          <input id="home-chart-search-input" type="search" placeholder="Search charts" autocomplete="off">
        </label>
        <p id="home-chart-status" class="home-status hidden" role="status" aria-live="polite"></p>
        <div id="home-chart-search-empty" class="home-empty" aria-live="polite">Recent charts appear here until you search.</div>
        <ul id="home-chart-search-results" class="home-list" aria-label="Chart search results"></ul>
      </section>
    </div>

    <div class="home-actions" aria-label="Home actions">
      <button id="home-import-charts-button" class="home-primary-action" type="button" aria-haspopup="dialog" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 3v11"></path>
          <path d="m7.5 9.5 4.5 4.5 4.5-4.5"></path>
          <path d="M5 17v2h14v-2"></path>
        </svg>
        <span>Import charts</span>
      </button>
      <a class="home-primary-action" href="./setlists.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9 6h11"></path>
          <path d="M9 12h11"></path>
          <path d="M9 18h11"></path>
          <path d="M4 6h.01"></path>
          <path d="M4 12h.01"></path>
          <path d="M4 18h.01"></path>
        </svg>
        <span>Setlists</span>
      </a>
      <a class="home-primary-action" href="./drill.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="8"></circle>
          <circle cx="12" cy="12" r="3.2"></circle>
          <path d="M12 12 19 5"></path>
          <path d="M15.9 5.1H19v3.1"></path>
          <path d="M18 4h2v2"></path>
        </svg>
        <span>Drill mode</span>
      </a>
      <a class="home-primary-action" href="./library.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3.5 5.4A6.8 6.8 0 0 1 10.2 4H12v18h-1.8a6.8 6.8 0 0 0-6.7 1.2Z"></path>
          <path d="M20.5 5.4A6.8 6.8 0 0 0 13.8 4H12v18h1.8a6.8 6.8 0 0 1 6.7 1.2Z"></path>
          <path d="M12 4v18"></path>
        </svg>
        <span>Library</span>
      </a>
    </div>
  </main>

  <div id="home-import-charts-popup" class="home-import-popup" role="dialog" aria-label="Import charts" hidden>
    <div class="home-import-popup-card">
      <div class="home-import-popup-header">
        <strong>Import charts</strong>
        <button id="home-import-close-button" class="home-metadata-close" type="button">Close</button>
      </div>
      <div id="ireal-import-actions" class="home-import-actions">
        <button id="open-ireal-forum-button" type="button" class="home-primary-action">iReal forum charts</button>
        <button id="import-ireal-backup-button" type="button" class="home-primary-action">Restore iReal backup</button>
      </div>
      <div id="ireal-link-import-section" class="home-import-link-section" hidden>
        <a class="home-import-forum-link" href="https://forums.irealpro.com" target="_blank" rel="noopener noreferrer">Browse the iReal forum</a>
        <label class="home-search-field">
          <span class="sr-only">Import iReal link</span>
          <input id="ireal-link-input" type="text" placeholder="Paste irealb:// link here" spellcheck="false">
        </label>
        <button id="import-ireal-link-button" type="button" class="home-primary-action">Import iReal link</button>
      </div>
      <div id="ireal-backup-restore-section" class="home-import-backup-section" hidden>
        <p class="home-import-note">Recommended: close this window. In iReal Pro, open Settings &gt; Save, then share the backup to Sharp11 from the share sheet.</p>
        <div class="home-import-backup-actions">
          <button id="ireal-backup-close-button" type="button" class="home-primary-action">Close this window</button>
          <button id="ireal-backup-file-button" type="button" class="home-metadata-close">Import from file instead</button>
        </div>
      </div>
    </div>
  </div>
  <input id="ireal-backup-input" type="file" accept=".html,.htm,.txt" hidden>

  <footer class="home-footer">
    <div class="home-theme-picker">
      <button id="home-theme-button" class="home-theme-button" type="button" aria-haspopup="menu" aria-expanded="false"></button>
      <div id="home-theme-menu" class="home-theme-menu hidden" role="menu" aria-label="Choose theme"></div>
    </div>
  </footer>
</body>
</html>
