<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Charts - Sharp Eleven</title>
  <link rel="icon" href="../assets/C5xjOdl-.svg" type="image/svg+xml">
  <script src="../theme-bootstrap.js"></script>
  <script type="module" crossorigin src="../assets/CvbMHTjn.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/Cf-ReJlZ.js">
  <link rel="modulepreload" crossorigin href="../assets/TNZNp2Qd.js">
  <link rel="modulepreload" crossorigin href="../assets/BoubiurR.js">
  <link rel="modulepreload" crossorigin href="../assets/Cm3fqnBM.js">
  <link rel="modulepreload" crossorigin href="../assets/BRTqzA7O.js">
  <link rel="modulepreload" crossorigin href="../assets/BX3AR_jx.js">
  <link rel="stylesheet" crossorigin href="../assets/BTs1uvhl.css">
  <link rel="stylesheet" crossorigin href="../assets/Dkrypotc.css">
  <link rel="stylesheet" crossorigin href="../assets/Ys0Bj9Dz.css">
</head>
<body>
  <div class="chart-app">
    <div class="chart-mobile-backdrop" id="chart-mobile-backdrop"></div>

    <!-- Top overlay: chart navigation -->
    <div class="chart-top-overlay" id="chart-top-overlay" aria-hidden="true">
      <div class="chart-top-bar">
        <a id="chart-home-button" class="app-back-button" href="../index.html" aria-label="Back to home">
          <span aria-hidden="true"></span>
        </a>
        <label class="chart-select-field chart-search-field">
          <span>Search</span>
          <input id="chart-search-input" type="search" placeholder="Title or composer">
        </label>
        <label class="chart-select-field chart-chart-select-field">
          <span>Chart</span>
          <select id="fixture-select"></select>
        </label>
        <div class="chart-library-count" id="chart-library-count">Loading library...</div>
        <div class="chart-top-actions">
          <div class="chart-popover-wrap" id="chart-metadata-wrap">
            <button type="button" id="chart-metadata-button" class="chart-icon-button chart-info-button" aria-label="Chart information" aria-haspopup="menu" aria-expanded="false"></button>
            <div class="chart-popover chart-metadata-popover" id="chart-metadata-popover" hidden></div>
          </div>
          <div class="chart-popover-wrap" id="manage-charts-wrap">
            <button type="button" id="manage-charts-button" class="chart-action-button chart-action-button-secondary" aria-haspopup="menu" aria-expanded="false">Manage charts</button>
            <div class="chart-popover" id="manage-charts-popover" hidden>
              <div id="chart-import-native-actions" class="chart-import-actions">
                <button id="import-ireal-backup-button" type="button" class="chart-action-button">Import iReal backup</button>
                <button id="open-ireal-forum-button" type="button" class="chart-action-button chart-action-button-secondary">iReal forum charts</button>
              </div>
              <button id="clear-all-charts-button" type="button" class="chart-action-button chart-action-button-secondary">Remove all charts</button>
              <div id="ireal-link-import-section" class="chart-import-link-section" hidden>
                <div class="chart-import-copy">
                  <strong>Paste an iReal link</strong>
                  <span>Use this after browsing the iReal default playlists or forum charts.</span>
                </div>
                <div class="chart-import-inputs">
                  <input id="ireal-link-input" type="text" placeholder="Paste irealb://… here" spellcheck="false">
                  <button id="import-ireal-link-button" type="button" class="chart-action-button">Import</button>
                </div>
              </div>
              <div id="chart-import-status" class="chart-import-status" role="status" aria-live="polite"></div>
            </div>
          </div>
        </div>
        <div class="chart-popover-wrap chart-instrument-settings-wrap" id="instrument-settings-wrap">
          <button type="button" id="instrument-settings-button" class="chart-icon-button chart-gear-button" aria-label="Instrument settings" aria-haspopup="menu" aria-expanded="false"></button>
          <div class="chart-popover chart-instrument-popover" id="instrument-settings-popover" hidden>
            <label class="chart-select-field">
              <span>Transposing instrument</span>
              <select id="instrument-transpose-select">
                <option value="0" selected>Concert pitch</option>
                <option value="2">Bb instrument</option>
                <option value="9">Eb instrument</option>
                <option value="7">F instrument</option>
              </select>
            </label>
            <div class="chart-settings-section chart-settings-section-tight">
              <h3>Export</h3>
              <button id="export-chart-pdf-button" type="button" class="chart-action-button chart-action-button-secondary">Export PDF</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Bottom overlay: transport controls -->
      <div class="chart-bottom-overlay" id="chart-bottom-overlay" aria-hidden="true">
        <div class="chart-transport-controls">
          <div class="chart-bottom-popover-wrap chart-tempo-field">
            <input id="tempo-input" type="number" min="40" max="320" step="1" value="120" hidden>
            <button id="tempo-button" type="button" class="chart-bottom-control-button" aria-haspopup="menu" aria-expanded="false">
              <span id="tempo-button-label">120 bpm</span>
            </button>
            <div id="tempo-popover" class="chart-bottom-popover chart-tempo-popover" hidden>
              <span class="chart-bottom-popover-title">Tempo</span>
              <strong id="tempo-popover-value">120</strong>
              <input id="tempo-range" type="range" min="40" max="320" step="1" value="120">
            </div>
          </div>
          <label class="chart-select-field chart-drums-playback-setting">
            <span>Drums</span>
            <select id="drums-select">
              <option value="off">Off</option>
              <option value="metronome_2_4">Metronome 2 &amp; 4</option>
              <option value="hihats_2_4">Hi-hat on 2 &amp; 4</option>
              <option value="full_swing" selected>Full swing drum pattern</option>
            </select>
          </label>
          <label class="chart-select-field chart-key-field">
            <span>Key</span>
            <select id="transpose-select" aria-label="Chart key"></select>
          </label>
        </div>
        <div class="chart-transport-bottom-row">
          <div class="chart-transport-meta">
            <span id="transport-status">Ready</span>
            <span id="transport-position">Bar 0 / 0</span>
            <span id="selection-summary">No selection</span>
          </div>
          <div class="chart-transport-buttons">
            <button id="stop-button" type="button" class="chart-transport-button">Stop</button>
            <button id="play-button" type="button" class="chart-transport-button chart-transport-play">Start</button>
            <div class="chart-bottom-popover-wrap chart-mixer-popover-wrap">
              <button id="chart-mixer-button" type="button" class="chart-transport-button chart-mixer-button" aria-label="Mixer" aria-haspopup="menu" aria-expanded="false">Mixer</button>
              <div id="mixer-popover" class="chart-bottom-popover chart-mixer-popover" hidden>
                <span class="chart-bottom-popover-title">Mixer</span>
                <label class="chart-select-field">
                  <span>Comping style</span>
                  <select id="comping-style-select">
                    <option value="off">Off</option>
                    <option value="strings">Strings</option>
                    <option value="piano" selected>Piano</option>
                  </select>
                </label>
                <div class="chart-mixer">
                  <label class="chart-slider-field">
                    <span>Master</span>
                    <div class="chart-slider-row">
                      <input id="master-volume" type="range" min="0" max="100" step="1" value="50">
                      <output id="master-volume-value">50%</output>
                    </div>
                  </label>
                  <label class="chart-slider-field">
                    <span>Bass</span>
                    <div class="chart-slider-row">
                      <input id="bass-volume" type="range" min="0" max="100" step="1" value="100">
                      <output id="bass-volume-value">100%</output>
                    </div>
                  </label>
                  <label class="chart-slider-field">
                    <span>Chords</span>
                    <div class="chart-slider-row">
                      <input id="strings-volume" type="range" min="0" max="100" step="1" value="100">
                      <output id="strings-volume-value">100%</output>
                    </div>
                  </label>
                  <label class="chart-slider-field">
                    <span>Drums</span>
                    <div class="chart-slider-row">
                      <input id="drums-volume" type="range" min="0" max="100" step="1" value="100">
                      <output id="drums-volume-value">100%</output>
                    </div>
                  </label>
                </div>
              </div>
            </div>
            <button id="clear-selection-button" type="button" class="chart-transport-button chart-clear-selection-button">Clear selection</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main chart area: always full screen, overlays float on top -->
    <main class="chart-workspace">
      <div class="chart-sheet-header">
        <div class="chart-sheet-title-row">
          <h2 id="sheet-title" class="chart-sheet-title"></h2>
        </div>
        <div class="chart-sheet-header-row">
          <div class="chart-sheet-style" id="sheet-style"></div>
          <div class="chart-sheet-subtitle" id="sheet-subtitle"></div>
        </div>
        <span id="sheet-time-signature" hidden></span>
        <span id="sheet-key" hidden></span>
      </div>
      <div id="sheet-grid" class="chart-sheet-grid"></div>
    </main>
    <div class="chart-selection-menu" id="chart-selection-menu" hidden aria-hidden="true">
      <div class="chart-selection-menu-card">
        <button id="selection-loop-button" type="button" class="chart-selection-menu-button">Loop</button>
        <button id="selection-create-drill-button" type="button" class="chart-selection-menu-button chart-selection-menu-button-secondary">Create a drill</button>
      </div>
    </div>
  </div>

  <input id="ireal-backup-input" type="file" accept=".html,.htm,.txt" hidden>

</body>
</html>
