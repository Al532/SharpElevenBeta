<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sharp Eleven App Demo</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=1.1.45">
  <link rel="shortcut icon" href="./favicon.svg?v=1.1.45">
  <link rel="stylesheet" href="./style.css?v=1.1.45">
  <script>
    window.JAZZ_TRAINER_GOATCOUNTER_ENDPOINT = 'https://aminel.goatcounter.com/count';
    window.goatcounter = window.goatcounter || {};
    window.goatcounter.path = function demoAnalyticsPath(path) {
      if (!path || path === location.pathname || path === location.pathname + location.search) {
        return '/demo.html';
      }
      return path;
    };
    window.JAZZ_TRAINER_ENABLE_GOATCOUNTER = !(
      location.hostname === 'localhost' ||
      location.hostname === '127.0.0.1' ||
      location.protocol === 'file:'
    );
  </script>
  <script>
    if (window.JAZZ_TRAINER_ENABLE_GOATCOUNTER) {
      const analyticsScript = document.createElement('script');
      analyticsScript.async = true;
      analyticsScript.dataset.goatcounter = 'https://aminel.goatcounter.com/count';
      analyticsScript.src = '//gc.zgo.at/count.js';
      document.head.appendChild(analyticsScript);
    }
  </script>
</head>
<body class="demo-page">
  <div id="app" class="demo-app">
    <header class="app-header demo-header">
      <a class="demo-back-link" href="./index.html">Back to app</a>
      <h1>Demo</h1>
      <p class="app-subtitle">A quick look at Sharp Eleven App in action.</p>
    </header>

    <main class="demo-grid">
      <section class="surface-block demo-card" aria-labelledby="demo-video-0-title">
        <h2 id="demo-video-0-title">Practicing a lick over minor II-V-I</h2>
        <div class="demo-video-frame">
          <iframe
            src="https://www.youtube-nocookie.com/embed/FqNIHfLFGSw"
            title="Sharp Eleven App demo video"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        </div>
      </section>

      <section class="surface-block demo-card" aria-labelledby="demo-video-1-title">
        <h2 id="demo-video-1-title">Improvisation over random Maj7 chords</h2>
        <p>To reproduce this setup in edit mode, enter the progression <code>Cmaj7</code>.</p>
        <div class="demo-video-frame demo-video-frame-portrait">
          <iframe
            src="https://www.youtube-nocookie.com/embed/iHtHOSwDCCw"
            title="Sharp Eleven App demo video"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
