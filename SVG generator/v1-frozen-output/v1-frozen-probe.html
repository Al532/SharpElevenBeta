<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../public/chord-symbol.css">
<style>
body { margin: 0; padding: 24px; background: white; color: #111; }
.probe-row { display: flex; align-items: baseline; gap: 24px; min-height: 121.6px; }
.probe-label { width: 80px; font: 14px/1.2 sans-serif; color: #666; }
.probe-chord { font-size: 64px; line-height: 1; }
</style>
</head>
<body>
<section class="probe-row" data-suffix="m"><div class="probe-label">m</div><div class="probe-chord" data-suffix="m"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-condensed-m"><span class="chord-symbol-base-content">m</span></span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="m7"><div class="probe-label">m7</div><div class="probe-chord" data-suffix="m7"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-condensed-m"><span class="chord-symbol-base-content">m</span></span></span><span class="chord-symbol-sup chord-symbol-sup-after-base chord-symbol-sup-anchor-condensed-m"><span class="chord-symbol-sup-content">7</span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="maj"><div class="probe-label">maj</div><div class="probe-chord" data-suffix="maj"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-condensed-maj"><span class="chord-symbol-base-content">maj</span></span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="maj7"><div class="probe-label">maj7</div><div class="probe-chord" data-suffix="maj7"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-symbol chord-symbol-base-symbol-majorTriangle"><span class="chord-symbol-quality-glyph chord-symbol-quality-glyph-majorTriangle" aria-hidden="true"><svg viewBox="0 0 100 86" focusable="false" aria-hidden="true"><path d="M50 8L92 78H8Z" fill="none" stroke="currentColor" stroke-width="10" stroke-linejoin="round"/></svg></span></span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="sus"><div class="probe-label">sus</div><div class="probe-chord" data-suffix="sus"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-condensed-sus"><span class="chord-symbol-base-content">sus</span></span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="7sus"><div class="probe-label">7sus</div><div class="probe-chord" data-suffix="7sus"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-condensed-sus"><span class="chord-symbol-base-content">sus</span></span></span><span class="chord-symbol-sup chord-symbol-sup-after-base chord-symbol-sup-anchor-condensed-sus"><span class="chord-symbol-sup-content">7</span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="dim"><div class="probe-label">dim</div><div class="probe-chord" data-suffix="dim"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-symbol chord-symbol-base-symbol-diminished"><span class="chord-symbol-quality-glyph chord-symbol-quality-glyph-diminished" aria-hidden="true"><svg viewBox="0 0 100 100" focusable="false" aria-hidden="true"><circle cx="50" cy="50" r="34" fill="none" stroke="currentColor" stroke-width="10"/></svg></span></span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="dim7"><div class="probe-label">dim7</div><div class="probe-chord" data-suffix="dim7"><span class="chord-symbol chord-symbol-with-base"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span><span class="chord-symbol-base chord-symbol-base-symbol chord-symbol-base-symbol-diminished"><span class="chord-symbol-quality-glyph chord-symbol-quality-glyph-diminished" aria-hidden="true"><svg viewBox="0 0 100 100" focusable="false" aria-hidden="true"><circle cx="50" cy="50" r="34" fill="none" stroke="currentColor" stroke-width="10"/></svg></span></span></span><span class="chord-symbol-sup chord-symbol-sup-after-base"><span class="chord-symbol-sup-content">7</span></span></span></span></span></div></section>
<section class="probe-row" data-suffix="69"><div class="probe-label">69</div><div class="probe-chord" data-suffix="69"><span class="chord-symbol chord-symbol-root-only chord-symbol-sup-reserve-medium"><span class="chord-symbol-topline"><span class="chord-symbol-head"><span class="chord-symbol-main"><span class="chord-symbol-root"><span class="chord-symbol-root-letter">C</span></span></span><span class="chord-symbol-sup chord-symbol-sup-after-root"><span class="chord-symbol-sup-content">69</span></span></span></span></span></div></section>
</body>
</html>
