<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="twitter:description" content="Browse the Sharp Eleven chart library.">

  <link rel="icon" href="./assets/Ba5MLdR8.png" type="image/png" sizes="16x16">
  <link rel="icon" href="./assets/8CA5PvgQ.png" type="image/png" sizes="32x32">
  <link rel="icon" href="./assets/DuxaSCbp.png" type="image/png" sizes="48x48">
  <link rel="apple-touch-icon" href="./assets/CaKPFyjJ.png" sizes="180x180">
  <link rel="manifest" href="./assets/Bv_iDeie.webmanifest">
  <script src="./theme-bootstrap.js"></script>
  <script type="module" crossorigin src="./assets/DClPGlqS.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/B2PlSRge.js">
  <link rel="modulepreload" crossorigin href="./assets/Br7rlHDh.js">

<body class="home-body library-body">
  <header class="home-header">
    <div class="home-header-leading">
      <a class="app-back-button" href="./index.html" aria-label="Back to home" title="Back to home">
        <span aria-hidden="true"></span>
      </a>
      <div class="home-brand" aria-label="Sharp Eleven">
        <img class="home-brand-logo" src="./assets/Ci--YQ_5.png" data-theme-dark-src="./logo/dark-mode.png" alt="Logo Classic Paper" width="32" height="32">
        <span>Sharp Eleven</span>
      </div>
    </div>
    <nav class="home-header-links" aria-label="Project links">
      <a class="home-icon-link" href="mailto:alcibiade.minel@gmail.com" aria-label="Share your feedback" title="Share your feedback">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 3.1V17h16V8.1l-7.36 5.15a1.1 1.1 0 0 1-1.28 0L4 8.1Zm1.15-1.1L12 11.8 18.85 7H5.15Z"></path>
        </svg>
      </a>
    </nav>
  </header>

  <main class="home-main library-main" aria-label="Library">
    <div class="home-stack">
      <section class="home-subsection" aria-labelledby="charts-library-title">
        <h2 id="charts-library-title">Library</h2>
        <div class="library-filter-grid">
          <div id="manage-source-filter-row" class="library-filter-row">
            <span class="library-filter-label">Sources:</span>
            <select id="manage-source-filter" class="library-select" aria-label="Filter by source" disabled>
              <option value="">Loading sources...</option>
              <option value="">All sources</option>
            </select>
            <div id="manage-source-filter-chips" class="library-filter-chips" aria-label="Filter by source" hidden></div>
          </div>
          <div id="manage-style-filter-row" class="library-filter-row">
            <span class="library-filter-label">Style:</span>
            <select id="manage-style-filter" class="library-select" aria-label="Filter by style" disabled>
              <option value="">Loading styles...</option>
              <option value="">All styles</option>
            </select>
            <div id="manage-style-filter-chips" class="library-filter-chips" aria-label="Filter by style" hidden></div>
          </div>
          <div id="manage-setlist-filter-row" class="library-filter-row">
            <span class="library-filter-label">Setlists:</span>
            <select id="manage-setlist-filter" class="library-select" aria-label="Filter by setlist" disabled>
              <option value="">Loading setlists...</option>
              <option value="">All setlists</option>
            </select>
            <div id="manage-setlist-filter-chips" class="library-filter-chips" aria-label="Filter by setlist" hidden></div>
          </div>
          <label class="home-search-field library-search">
            <span class="sr-only">Search library</span>
            <input id="manage-chart-search-input" type="search" placeholder="Search the library">
          </label>
        </div>
        <ul id="manage-chart-list" class="home-list library-chart-list" aria-label="Library charts">
          <li class="library-shell-placeholder" aria-hidden="true"></li>
          <li class="library-shell-placeholder" aria-hidden="true"></li>
          <li class="library-shell-placeholder" aria-hidden="true"></li>
        </ul>
        <div id="manage-library-summary" class="library-results-entry" aria-live="polite">
          <div class="library-batch-panel library-batch-panel-placeholder" aria-hidden="true">
            <div class="library-batch-count">
              <strong class="library-batch-count-title">Loading charts</strong>
              <span class="library-batch-count-meta">Preparing the library shell</span>
            </div>
            <button class="library-batch-action" type="button" disabled>Review delete</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="manage-metadata-panel" class="chart-metadata-panel" hidden></div>
</body>
</html>
